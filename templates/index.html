<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">

<title>Pavan Gopal Virinchi Motupalli</title>

<style>

/* DESKTOP SPLIT SCREEN */

.split-container{
display:flex;
height:100vh;
position:relative;
}

/* PANELS */

.panel{
flex:1;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:white;
transition:.3s ease;
position:relative;
}

.panel:hover{
transform:scale(1.02);
}

/* BACKGROUNDS */

.engineer{
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
url("/static/engineer.jpeg");
background-size:cover;
background-position:center;
}

.fighter{
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
url("/static/fight2.jpeg");
background-size:cover;
background-position:center;
}

/* CENTER PORTRAIT (DESKTOP) */

.identity{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:3;
}

.identity img{
width:320px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,.8);
}

/* NAME */

.identity h1{
margin-top:14px;
font-weight:700;
font-size:28px;
letter-spacing:.4px;
}

/* PANEL TEXT */

.panel-content{
text-align:center;
}

.label{
font-size:46px;
font-weight:600;
margin-top:14px;
}

.sub{
font-size:16px;
opacity:.85;
margin-top:6px;
}


/* ========================= */
/* MOBILE LAYOUT OVERRIDE */
/* ========================= */

@media(max-width:900px){

/* vertical split layout */

.split-container{
flex-direction:column;
height:100vh;
}

/* panels occupy equal halves */

.panel{
height:50vh;
}

/* portrait anchored at split boundary */

.identity{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%, -50%);

z-index:5;

}

/* square portrait with TOP crop */

.identity img{

width:150px;
height:150px;

object-fit:cover;
object-position:top;

border-radius:12px;

/* subtle border instead of padding frame */

border:1px solid rgba(255,255,255,.18);

box-shadow:0 8px 24px rgba(0,0,0,.55);

}

/* FORCE hide name on mobile */

.identity h1{

display:none !important;

}

/* prevent overlap with panel text */

.panel-content{

transform:translateY(-22px);

}

/* reduce label sizes */

.label{

font-size:30px;

}

.sub{

font-size:13px;

opacity:.9;

}

}

</style>

</head>

<body>

<div class="split-container">

<div class="identity">

<img src="/static/landing.jpeg">

<h1>Pavan Gopal Virinchi Motupalli</h1>

</div>


<a href="/engineer" class="panel engineer">

<div class="panel-content">

<div class="icon">
<img src="/static/laptop.svg">
</div>

<div class="label">The Engineer</div>

<div class="sub">
AI • Physics • Mathematics
</div>

</div>

</a>


<a href="/fighter" class="panel fighter">

<div class="panel-content">

<div class="icon">
<img src="/static/fist.svg">
</div>

<div class="label">The Fighter</div>

<div class="sub">
Kickboxing • MMA
</div>

</div>

</a>

</div>

</body>
</html>
